name: Examples

on:
  push:
    branches:
      - master
      - main
      - guillemc
  pull_request:
    branches:
      - master
      - main

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  LUPNT_DATA_PATH: ${{ github.workspace }}/LuPNT_data

jobs:
  examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/cache@v3
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: configure
        run: cmake -Sexamples/cpp -Bbuild_examples -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build_examples -j4 --target all_examples

      - name: run examples
        run: |
          cd ./build_examples/examples && for example in *; do
            file_path=$(find ../../examples/cpp -name "$example.cc")
            if [ -n "$file_path" ]; then
              if ! grep -qE "show()|draw()" "$file_path"; then
                echo "\n\n*********** Running example: $example ***********\n"
                ./"$example"
              fi
            fi
          done
          cd ../..